name: OpenSSF Scorecard

# Weekly supply-chain health check. Computes scores against the OpenSSF
# Scorecard heuristics (branch protection, signed releases, pinned deps,
# fuzzing, token permissions, etc.) and uploads the results to the repo's
# Security tab as SARIF + as a public Scorecard badge.
#
# Read-only against the repo: writes only the SARIF artifact + the
# OIDC-signed publish to the public Scorecard registry.
on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # Mon 06:00 UTC

permissions: read-all

jobs:
  analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      # Required to upload SARIF to the Security tab.
      security-events: write

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run Scorecard
        # ossf/scorecard-action doesn't publish a floating major tag; pin
        # to the latest exact release. Dependabot keeps this current.
        uses: ossf/scorecard-action@v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # publish_results=true would push the score to the public OpenSSF
          # Scorecard registry (and emit a badge), but enabling it locks the
          # job to `uses:`-only steps for verification — which forbids the
          # `jq` filter step below. We keep the SARIF flowing into Code
          # Scanning instead; that's where the actionable signal lives.
          publish_results: false

      # Drop checks whose findings don't apply to this repo's profile.
      # The action doesn't expose a `policy_file` input (we tried, it
      # logs `Unexpected input(s) 'policy_file'`), so we filter the SARIF
      # ourselves before upload. Each ruleId removed below is a deliberate
      # accept:
      #
      #   PinnedDependenciesID    — we float to action major tags so
      #                             Dependabot can roll us forward; pinning
      #                             to SHAs would freeze that loop.
      #   CodeReviewID            — solo maintainer, every commit lands
      #                             directly on main, no PR review pipeline.
      #   FuzzingID               — static-metadata reading tracker; no
      #                             untrusted user input flows anywhere
      #                             worth fuzzing.
      #   CIIBestPracticesID      — aspirational badge program, no plans to
      #                             apply for it.
      #   MaintainedID            — transient false positive: repo is new
      #                             (split out of monorepo April 2026); the
      #                             heuristic clears at 90 days. Re-enable
      #                             this entry as a test by removing it
      #                             from the array after July 2026.
      #
      # Branch-Protection deliberately stays in: real signal that clears
      # once the rule is enabled in Settings.
      - name: Filter SARIF — drop checks that don't apply to this repo
        run: |
          jq '
            .runs[].results |= map(select(
              .ruleId as $r |
              ["PinnedDependenciesID","CodeReviewID","FuzzingID",
               "CIIBestPracticesID","MaintainedID"]
              | index($r) | not
            ))
          ' results.sarif > filtered.sarif
          mv filtered.sarif results.sarif

      # Keep a copy of the SARIF so it can be inspected from the Actions UI.
      - name: Upload SARIF as artifact
        uses: actions/upload-artifact@v7
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 14

      # Push the SARIF into Code Scanning so findings show alongside CodeQL.
      - name: Upload SARIF to Code Scanning
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif
