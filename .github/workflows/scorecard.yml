name: OpenSSF Scorecard

# Weekly supply-chain health check. Computes scores against the OpenSSF
# Scorecard heuristics (branch protection, signed releases, pinned deps,
# fuzzing, token permissions, etc.) and uploads the results to the repo's
# Security tab as SARIF + as a public Scorecard badge.
#
# Read-only against the repo: writes only the SARIF artifact + the
# OIDC-signed publish to the public Scorecard registry.
on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # Mon 06:00 UTC

permissions: read-all

jobs:
  analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      # Required to upload SARIF to the Security tab.
      security-events: write
      # OIDC token for publishing scorecard results to the public registry.
      id-token: write

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run Scorecard
        # ossf/scorecard-action doesn't publish a floating major tag; pin
        # to the latest exact release. Dependabot keeps this current.
        uses: ossf/scorecard-action@v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true
          # Per-repo policy that silences a handful of checks that
          # don't apply to this project's profile (solo OSS, no fuzzing,
          # no SHA-pinning, etc). Rationale lives in the policy file.
          policy_file: .github/scorecard-policy.yml

      # Keep a copy of the SARIF so it can be inspected from the Actions UI.
      - name: Upload SARIF as artifact
        uses: actions/upload-artifact@v7
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 14

      # Push the SARIF into Code Scanning so findings show alongside CodeQL.
      - name: Upload SARIF to Code Scanning
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif
